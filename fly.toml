# fly.toml app configuration file generated for hello-elixir-sqlite-qrh91a on 2024-12-09T15:22:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hello-elixir-sqlite-qrh91a'
primary_region = 'gru'
kill_signal = 'SIGTERM'

[build]

[env]
  DATABASE_PATH = '/mnt/name/name.db'
  PHX_HOST = 'hello-elixir-sqlite-qrh91a.fly.dev'
  PORT = '8080'

[[mounts]]
  source = 'name'
  destination = '/mnt/name'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
